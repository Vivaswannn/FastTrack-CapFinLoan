name: CapFinLoan CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'

jobs:

  # ── Job 1: Build and Test Backend ─────────────────────────
  backend-ci:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore Backend/CapFinLoan.slnx

      - name: Build solution
        run: dotnet build Backend/CapFinLoan.slnx --no-restore --configuration Release

      - name: Run unit tests
        run: |
          dotnet test Backend/CapFinLoan.slnx \
            --no-build \
            --configuration Release \
            --verbosity normal \
            --logger "console;verbosity=normal"

  # ── Job 2: Build Frontend ──────────────────────────────────
  frontend-ci:
    name: Frontend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        working-directory: Frontend/capfinloan-frontend
        run: npm ci

      - name: Build frontend
        working-directory: Frontend/capfinloan-frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/gateway

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/capfinloan-frontend/dist
