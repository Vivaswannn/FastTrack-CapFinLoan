name: CapFinLoan CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  DOTNET_VERSION: '10.0.x'
  NODE_VERSION: '20.x'
  MIN_COVERAGE: 90

jobs:

  # ── Job 1: Build and Test Backend ─────────────────────────
  backend-ci:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: 'zulu'

      - name: Install SonarCloud scanner
        run: dotnet tool install --global dotnet-sonarscanner

      - name: Begin Sonar Analysis
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          dotnet-sonarscanner begin \
            /k:"CapFinLoan_Backend" \
            /d:sonar.token="${{ secrets.SONAR_TOKEN }}" \
            /d:sonar.host.url="https://sonarcloud.io" \
            /d:sonar.cs.cobertura.reportsPaths="TestResults/**/coverage.cobertura.xml"

      - name: Restore dependencies
        run: |
          dotnet restore \
            "CapFinLoan/Backend/CapFinLoan.slnx"

      - name: Build solution
        run: |
          dotnet build \
            "CapFinLoan/Backend/CapFinLoan.slnx" \
            --no-restore \
            --configuration Release

      - name: Run unit tests with coverage
        run: |
          dotnet test \
            "CapFinLoan/Backend/CapFinLoan.slnx" \
            --no-build \
            --configuration Release \
            --collect:"XPlat Code Coverage" \
            --results-directory TestResults \
            --verbosity normal \
            -- DataCollectionRunSettings.DataCollectors\
               .DataCollector.Configuration.Format=cobertura

      - name: End Sonar Analysis
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: dotnet-sonarscanner end /d:sonar.token="${{ secrets.SONAR_TOKEN }}"

      - name: Upload coverage reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-reports
          path: TestResults/**/coverage.cobertura.xml

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: TestResults/**/coverage.cobertura.xml
          badge: true
          fail_below_min: true
          format: markdown
          min_coverage: ${{ env.MIN_COVERAGE }}
          output: both
          thresholds: '90 95'

      - name: Fail if coverage below threshold
        if: always()
        run: |
          echo "Minimum coverage threshold: ${{ env.MIN_COVERAGE }}%"
          echo "Build will fail if coverage drops below this threshold."
          echo "Coverage enforcement is handled by CodeCoverageSummary above."

  # ── Job 2: Build and Test Frontend ────────────────────────
  frontend-ci:
    name: Frontend Build & Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: |
            CapFinLoan/Frontend/capfinloan-frontend/package-lock.json

      - name: Install dependencies
        working-directory: CapFinLoan/Frontend/capfinloan-frontend
        run: npm ci

      - name: Security audit
        working-directory: CapFinLoan/Frontend/capfinloan-frontend
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Build frontend
        working-directory: CapFinLoan/Frontend/capfinloan-frontend
        run: npm run build
        env:
          VITE_API_URL: http://localhost:5000/gateway

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: CapFinLoan/Frontend/capfinloan-frontend/dist

  # ── Job 3: Docker Build (only on push to main) ────────────
  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: [backend-ci, frontend-ci]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Gateway image
        uses: docker/build-push-action@v5
        with:
          context: CapFinLoan/Backend
          file: CapFinLoan/Backend/ApiGateway/CapFinLoan.Gateway/Dockerfile
          push: false
          tags: capfinloan/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build AuthService image
        uses: docker/build-push-action@v5
        with:
          context: CapFinLoan/Backend
          file: CapFinLoan/Backend/Services/CapFinLoan.AuthService/Dockerfile
          push: false
          tags: capfinloan/auth-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build ApplicationService image
        uses: docker/build-push-action@v5
        with:
          context: CapFinLoan/Backend
          file: CapFinLoan/Backend/Services/CapFinLoan.ApplicationService/Dockerfile
          push: false
          tags: capfinloan/application-service:latest

      - name: Build DocumentService image
        uses: docker/build-push-action@v5
        with:
          context: CapFinLoan/Backend
          file: CapFinLoan/Backend/Services/CapFinLoan.DocumentService/Dockerfile
          push: false
          tags: capfinloan/document-service:latest

      - name: Build AdminService image
        uses: docker/build-push-action@v5
        with:
          context: CapFinLoan/Backend
          file: CapFinLoan/Backend/Services/CapFinLoan.AdminService/Dockerfile
          push: false
          tags: capfinloan/admin-service:latest

      - name: Build NotificationService image
        uses: docker/build-push-action@v5
        with:
          context: CapFinLoan/Backend
          file: CapFinLoan/Backend/Services/CapFinLoan.NotificationService/Dockerfile
          push: false
          tags: capfinloan/notification-service:latest

      - name: Build PaymentService image
        uses: docker/build-push-action@v5
        with:
          context: CapFinLoan/Backend
          file: CapFinLoan/Backend/Services/CapFinLoan.PaymentService/Dockerfile
          push: false
          tags: capfinloan/payment-service:latest

      - name: All Docker images built successfully
        run: echo "All 7 service images built and verified"
